version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flowadmin_db
    environment:
      POSTGRES_USER: flowadmin
      POSTGRES_PASSWORD: flowadmin_password
      POSTGRES_DB: flowadmin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowadmin_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://flowadmin:flowadmin_password@db:5432/flowadmin_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data:
